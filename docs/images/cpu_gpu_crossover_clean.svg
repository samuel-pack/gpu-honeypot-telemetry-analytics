<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="24" font-weight="700">
    CPU vs GPU Runtime Crossover
  </text>

  <!-- Plot area: x=95..750, y=60..430. Right side reserved for legend. -->
  <line x1="95" y1="430" x2="750" y2="430" stroke="#24292f" stroke-width="2"/>
  <line x1="95" y1="60" x2="95" y2="430" stroke="#24292f" stroke-width="2"/>

  <line x1="95" y1="430" x2="750" y2="430" stroke="#d0d7de" stroke-dasharray="4 4"/>
  <line x1="95" y1="337.5" x2="750" y2="337.5" stroke="#d0d7de" stroke-dasharray="4 4"/>
  <line x1="95" y1="245" x2="750" y2="245" stroke="#d0d7de" stroke-dasharray="4 4"/>
  <line x1="95" y1="152.5" x2="750" y2="152.5" stroke="#d0d7de" stroke-dasharray="4 4"/>
  <line x1="95" y1="60" x2="750" y2="60" stroke="#d0d7de" stroke-dasharray="4 4"/>

  <text x="82" y="435" text-anchor="end" font-size="14">10</text>
  <text x="82" y="342.5" text-anchor="end" font-size="14">100</text>
  <text x="82" y="250" text-anchor="end" font-size="14">1,000</text>
  <text x="82" y="157.5" text-anchor="end" font-size="14">10,000</text>
  <text x="82" y="65" text-anchor="end" font-size="14">100,000</text>

  <!-- CPU/Pandas: 47.40, 3855.97, 37099.22 ms -->
  <polyline points="95,399.4 422.5,190.8 750,100.0" fill="none" stroke="#0969da" stroke-width="4"/>
  <circle cx="95" cy="399.4" r="6" fill="#0969da"/>
  <circle cx="422.5" cy="190.8" r="6" fill="#0969da"/>
  <circle cx="750" cy="100.0" r="6" fill="#0969da"/>

  <!-- GPU/cuDF: 2673.02, 1275.38, 4949.73 ms -->
  <polyline points="95,220.3 422.5,243.0 750,182.9" fill="none" stroke="#cf222e" stroke-width="4"/>
  <circle cx="95" cy="220.3" r="6" fill="#cf222e"/>
  <circle cx="422.5" cy="243.0" r="6" fill="#cf222e"/>
  <circle cx="750" cy="182.9" r="6" fill="#cf222e"/>

  <text x="95" y="467" text-anchor="middle" font-size="18">10K</text>
  <text x="422.5" y="467" text-anchor="middle" font-size="18">1M</text>
  <text x="750" y="467" text-anchor="middle" font-size="18">10M</text>

  <text x="28" y="255" transform="rotate(-90 28,255)" text-anchor="middle" font-size="18">
    Total runtime, ms log scale
  </text>
  <text x="422.5" y="502" text-anchor="middle" font-size="18">Dataset size</text>

  <!-- Legend outside plot area -->
  <rect x="790" y="205" width="180" height="72" fill="white" stroke="#d0d7de"/>
  <line x1="810" y1="232" x2="860" y2="232" stroke="#0969da" stroke-width="4"/>
  <text x="872" y="238" font-size="16">CPU/Pandas</text>
  <line x1="810" y1="259" x2="860" y2="259" stroke="#cf222e" stroke-width="4"/>
  <text x="872" y="265" font-size="16">GPU/cuDF</text>
</svg>
